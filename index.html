<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>2026 Calendar</title>
    <style>
        :root { --bg: #ffffff; --text: #222; --card: #f0f0f0; --accent: #e67e22; --circle: #d35400; }
        [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --accent: #f39c12; --circle: #e67e22; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; transition: 0.3s; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Circular Clock */
        .clock-container { width: 180px; height: 180px; border: 5px solid var(--circle); border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 30px; box-shadow: 0 0 15px var(--accent); }
        #time { font-size: 1.6rem; font-weight: bold; }
        #date-display { font-size: 0.85rem; letter-spacing: 1px; color: var(--accent); }

        /* Calendar Styling */
        .calendar-card { background: var(--card); width: 360px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; gap: 5px; }
        .day-name { font-weight: bold; color: var(--accent); font-size: 0.8rem; padding-bottom: 10px; }
        .day { padding: 10px; border-radius: 5px; cursor: pointer; }
        .day:hover { background: var(--accent); color: white; }
        .today { border: 2px solid var(--accent); font-weight: bold; }

        /* Buttons & Festival Text */
        .btn { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .mode-toggle { position: fixed; top: 20px; right: 20px; }
        .festivals { margin-top: 20px; text-align: center; font-size: 0.9rem; border-top: 1px solid #555; padding-top: 10px; min-height: 50px; color: var(--accent); }
    </style>
</head>
<body>


        
    <table border="0" width="100%">
        <tr>
        <td>
        <center>
        <img src="Suvarna Lakshmi Frame.png" width="150px">
        <font color="orange"><h1>SUVARNA LAKSHMI ENTERPRISES</h1></font><br><br><br>
        </center>
       </td>
       </tr>
    </table>

   
    <button class="btn mode-toggle" onclick="toggleTheme()">Toggle Dark Mode</button>

    <div class="clock-container">
        <div id="time">00:00:00</div>
        <div id="date-display">15 MAR 2026</div>
    </div>

    <div class="calendar-card">
        <div class="header">
            <button class="btn" onclick="changeMonth(-1)">PREV</button>
            <h3 id="monthYear">MARCH 2026</h3>
            <button class="btn" onclick="changeMonth(1)">NEXT</button>
        </div>
        <div class="grid" id="calendarGrid"></div>
        <div class="festivals" id="festivalBox"></div>
    </div>
    </table>


    <script>
        let currentYear = 2026;
        let currentMonth = 2; // March

        // 2026 Indian Festival Data (Lunar/Solar)
        const festivalData = {
            "0-14": "Makar Sankranti / Pongal", "0-23": "Vasant Panchami", "0-26": "Republic Day",
            "1-15": "Maha Shivaratri", "2-4": "Holi", "2-19": "Gudi Padwa / Ugadi", "2-21": "Eid-ul-Fitr (Tentative)", "2-26": "Ram Navami", "2-31": "Mahavir Jayanti",
            "3-3": "Good Friday", "4-1": "Buddha Purnima", "4-27": "Bakrid (Tentative)",
            "5-26": "Muharram (Tentative)", "7-15": "Independence Day", "7-26": "Onam / Raksha Bandhan",
            "8-4": "Janmashtami", "8-14": "Ganesh Chaturthi",
            "9-2": "Gandhi Jayanti", "9-11": "Navratri Begins", "9-20": "Dussehra",
            "10-8": "Diwali / Deepavali", "10-24": "Guru Nanak Jayanti",
            "11-25": "Christmas"
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('en-IN', { hour12: false });
            document.getElementById('date-display').innerText = now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const label = document.getElementById('monthYear');
            const festBox = document.getElementById('festivalBox');
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const monthName = new Date(currentYear, currentMonth).toLocaleString('default', { month: 'long' }).toUpperCase();

            label.innerText = `${monthName} ${currentYear}`;
            grid.innerHTML = '';
            festBox.innerText = "";

            ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const isToday = (new Date().getDate() === d && new Date().getMonth() === currentMonth && new Date().getFullYear() === currentYear) ? 'today' : '';
                grid.innerHTML += `<div class="day ${isToday}">${d}</div>`;
                
                // Show festival if year is 2026
                if (currentYear === 2026 && festivalData[`${currentMonth}-${d}`]) {
                    festBox.innerText += `${d} ${monthName.slice(0,3)}: ${festivalData[`${currentMonth}-${d}`]}\n`;
                }
            }
        }

        function changeMonth(dir) {
            currentMonth += dir;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            
            // Limit range 2026-2100
            currentYear = Math.min(2100, Math.max(2026, currentYear));
            renderCalendar();
        }

        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        setInterval(updateClock, 1000);
        renderCalendar();
        updateClock();
    </script>

</body>
</html>
